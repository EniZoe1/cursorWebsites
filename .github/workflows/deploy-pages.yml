# Buduje Vite (dist) i wypycha na gałąź gh-pages. GitHub Pages serwuje ten folder jako stronę.
#
# Ustawienia repozytorium → Pages → Build and deployment:
#   Source: Deploy from a branch
#   Branch: gh-pages  /  folder: / (root)
#
# (Opcja „GitHub Actions” + artefakt upload-pages-artifact często zostaje na starym
# widoku z roota repo, jeśli deploy się nie dokończy — ten sposób jest niezawodniejszy.)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: Verify dist is a Vite production build
        run: |
          if grep -q 'src/main.js' dist/index.html; then
            echo "::error::dist/index.html still references dev entry"
            exit 1
          fi
          if ! grep -qE 'assets/index-.*\.js' dist/index.html; then
            echo "::error::dist/index.html missing hashed JS bundle"
            exit 1
          fi
      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
