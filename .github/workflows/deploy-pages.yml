# Builds Vite output and deploys ./dist to GitHub Pages.
#
# WYMAGANE: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
# (NIE „Deploy from a branch”). Inaczej GitHub serwuje surowy index.html z roota
# (/src/main.js, /logo.svg) zamiast folderu dist — na hostingu będzie „zepsuty” widok.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Ścieżka musi dokładnie odpowiadać nazwie repo w URL (np. /cursorWebsites/), inaczej 404 na assets przy case-sensitive hostingu
      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: Verify dist is a Vite production build
        run: |
          if grep -q 'src/main.js' dist/index.html; then
            echo "::error::dist/index.html still references dev entry — build misconfigured"
            exit 1
          fi
          if ! grep -qE 'assets/index-.*\.js' dist/index.html; then
            echo "::error::dist/index.html missing hashed JS bundle"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
